  <style> 
    :root{
      --bg:#081a33;
      --surface:#102443;
      --accent:#ea580c;
      --gold:#d4a017;
      --text:#ffffff;
      --muted:#b7c3d9;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      font-family:'Plus Jakarta Sans',sans-serif;
      background:linear-gradient(135deg,#09172d 0%,#0d2445 100%);
      color:var(--text);
    }
    .shell{width:min(100%,1100px);}
    .card{
      display:grid;
      grid-template-columns:1.1fr .9fr;
      background:rgba(16,36,67,.96);
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 30px 80px rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.06);
      animation:fadeUp .9s ease forwards;
    }
    .content{padding:64px 56px;}
    .eyebrow{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border-radius:999px;background:rgba(234,88,12,.12);border:1px solid rgba(234,88,12,.35);color:#ffd7b8;font-size:.82rem;font-weight:700;margin-bottom:26px}
    .pulse{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 rgba(234,88,12,.5);animation:pulse 1.8s infinite}
    @keyframes pulse{70%{box-shadow:0 0 0 10px rgba(234,88,12,0)}100%{box-shadow:0 0 0 0 rgba(234,88,12,0)}}
    h1{font-size:clamp(2.2rem,5vw,4rem);line-height:1.02;margin-bottom:14px;font-weight:800}
    .tagline{font-size:1.2rem;color:#f3cd75;font-weight:700;margin-bottom:18px}
    .body{font-family:'DM Sans',sans-serif;color:var(--muted);font-size:1.03rem;line-height:1.8;max-width:520px;margin-bottom:30px}
    .btn{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;text-decoration:none;padding:16px 28px;border-radius:16px;font-weight:700;transition:.3s}
    .btn:hover{transform:translateY(-4px);box-shadow:0 16px 30px rgba(234,88,12,.25)}
    .micro{margin-top:16px;color:#d8c089;font-size:.92rem}
    .visual{position:relative;display:flex;align-items:center;justify-content:center;padding:40px;background:radial-gradient(circle at top,#1f3b73 0%,#0c1c35 70%)}
    .ring{width:220px;height:220px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));display:grid;place-items:center;box-shadow:0 25px 60px rgba(234,88,12,.25);animation:float 5s ease-in-out infinite}
    .inner{width:170px;height:170px;border-radius:50%;background:#0f2442;display:grid;place-items:center;padding:24px}
    .side-logo{max-width:100%;height:auto;object-fit:contain;filter:drop-shadow(0 10px 18px rgba(8,26,51,.18));animation:logoFloat 4s ease-in-out infinite;} 
    @keyframes logoFloat{50%{transform:translateY(-8px) scale(1.02)}}
    @keyframes draw{to{stroke-dashoffset:0}}
    @keyframes float{50%{transform:translateY(-14px)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
    @media(max-width:900px){.card{grid-template-columns:1fr}.visual{order:-1;padding:32px}.content{padding:38px 26px;text-align:center}.body{margin-left:auto;margin-right:auto}}
  </style>
